<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Agent</title>
    <style>
        /* Sleek Dark Mode UI */
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 450px; height: 650px; background: #1e1e1e; border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; overflow: hidden; }
        #header { background: #2a2a2a; padding: 18px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; font-size: 1.1rem; letter-spacing: 0.5px; }
        #header span { color: #4ade80; } /* Green online dot */
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .user-msg { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #374151; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { display: flex; padding: 16px; background: #2a2a2a; border-top: 1px solid #333; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; color: #fff; outline: none; font-size: 0.95rem; transition: border 0.2s; }
        input:focus { border-color: #2563eb; }
        button { background: #2563eb; color: #fff; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="header"><span>●</span> Llama 3 Agentic RAG</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="chat-input" placeholder="Ask a question..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        
        // Connect to the local Docker backend
        const ws = new WebSocket('ws://localhost:8000/ws/chat');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user-msg' : 'ai-msg');
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll
        }

        ws.onopen = () => addMessage("System initialized. Secure WebSocket connection established.", 'ai');
        
        ws.onmessage = (event) => addMessage(event.data, 'ai');
        
        ws.onerror = () => addMessage("Error connecting to backend. Is Docker running?", 'ai');
        
        ws.onclose = () => addMessage("Connection disconnected.", 'ai');

        function sendMessage() {
            const text = inputField.value.trim();
            if (text && ws.readyState === WebSocket.OPEN) {
                addMessage(text, 'user');
                ws.send(text);
                inputField.value = '';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>

</body>
</html>
